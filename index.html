<!doctype html>
<html lang="en">
    <head>
        <title>Travel Website</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="src/styles/main.scss" />
        <link rel="stylesheet" href="/assets/icons/icomoon/style.css" />
    </head>

    <body>
        <!-- header section -->
        <!--
            This contains following properties:
            - Responsive navigation layout.
            - Hamburger menu for mobile and tablet devices.
            - Desktop navigation links.
            - Authentication actions (Login / Sign Up).

            The mobile menu is displayed through JavaScript by toggling
            modifier classes on the menu and overlay elements.
        -->
        <nav class="navbar">
            <div class="navbar__overlay"></div>
            <!--
                Mobile navigation drawer.

                Hidden by default and slides into view when the user clicks
                the hamburger icon. Contains navigation links and mobile-only
                authentication buttons.
            -->
            <aside class="navbar__menu">
                <a class="navbar__link" href="##hero-section">Home</a>
                <a class="navbar__link" href="#travel-section">Discover</a>
                <a class="navbar__link" href="#testimonial-section"
                    >Special Deals</a
                >
                <a class="navbar__link" href="#footer-section">Contact</a>
                <div class="navbar__auth navbar__auth--mobile">
                    <button class="navbar__auth-btn btn btn--primary btn--pill">
                        Log In
                    </button>
                    <button class="navbar__auth-btn btn btn--primary btn--pill">
                        Sign Up
                    </button>
                </div>
            </aside>

            <div class="navbar__logo">
                <a href="/">
                    <img
                        class="navbar__logo-img"
                        src="/assets/icons/logo.svg"
                        alt="logo-icon"
                    />
                </a>
            </div>
            <button class="navbar__hamburger">
                <span class="icon-hamburger"></span>
            </button>
            <div class="navbar__links">
                <a class="navbar__link" href="#hero-section">Home</a>
                <a class="navbar__link" href="#travel-section">Discover</a>
                <a class="navbar__link" href="#testimonial-section"
                    >Special Deals</a
                >
                <a class="navbar__link" href="#footer-section">Contact</a>
            </div>
            <div class="navbar__auth">
                <button class="btn btn--secondary btn--pill">Log In</button>
                <button class="btn btn--primary btn--pill">Sign Up</button>
            </div>
        </nav>

        <main>
            <!-- hero section -->
            <section class="hero">
                <!-- This contains floating overlay-->
                <div class="hero__overlay">
                    <img
                        class="hero__overlay--img"
                        src="/assets/images/hero-float.svg"
                        alt="overlay"
                    />
                </div>
                <!-- The text content of hero section divided into nested divs -->
                <section class="hero__info">
                    <div class="hero__content">
                        <div class="hero__workbag workbag-para">
                            Explore the world!
                            <span class="icon-work-bag"></span>
                        </div>
                        <h1 class="hero__content--h1">
                            Travel
                            <span class="hero__content--highlight"
                                >top destination</span
                            >
                            of the world
                        </h1>
                        <p class="hero__content--p secondary-para">
                            We always make our customer happy by providing
                            <br />
                            as many choices as possible
                        </p>
                        <!-- used the already implemented components of buttons -->
                        <div class="hero__buttons">
                            <button
                                class="hero__btn btn btn--primary btn--shadow"
                            >
                                Get Started
                            </button>
                            <button
                                class="hero__btn btn btn--secondary btn--icon"
                            >
                                <!-- kept in different spans bcoz play-btn was not in center without it-->
                                <span class="icon-play-btn"></span>
                                <span>Watch Demo</span>
                            </button>
                        </div>
                    </div>
                    <!-- Hero image to be displayed on hero section -->
                    <div class="hero__image">
                        <img
                            class="hero_image hero__image--img"
                            src="/assets/images/hero-img.svg"
                            alt="hero-image"
                        />
                    </div>
                </section>
                <!-- All the brands partner are visible here -->
                <section class="hero__partner">
                    <img
                        class="hero__partner--img"
                        src="/assets/images/partner-img1.svg"
                        alt="partner-img1"
                    />
                    <img
                        class="hero__partner--img"
                        src="/assets/images/partner-img2.svg"
                        alt="partner-img2"
                    />
                    <img
                        class="hero__partner--img"
                        src="/assets/images/partner-img3.svg"
                        alt="partner-img3"
                    />
                    <img
                        class="hero__partner--img"
                        src="/assets/images/partner-img5.svg"
                        alt="partner-img5"
                    />
                    <img
                        class="hero__partner--img"
                        src="/assets/images/partner-img4.svg"
                        alt="partner-img4"
                    />
                </section>
            </section>
        </main>

        <script type="module" src="./src/script/index.js"></script>
    </body>
</html>
